<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Task Manager - A simple, interactive To-Do List application in Vanilla JavaScript.">
  <title>Task Manager</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <form id="new-item-form" class="new-item-form">
    <div class="form-row">
      <label for="todo-input">New Item</label>
      <input type="text" id="todo-input" placeholder="Enter task name" autocomplete="off">
    </div>
    <button class="btn" type="submit">Add</button>
  </form>
  <h1 class="header">Task Manager</h1>
  <ul id="list"></ul>
</body>
</html>
